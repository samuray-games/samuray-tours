 function escapeHtmlFull(value){
  return String(value||"").replace(/[&<>\"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];});
 }

 function findAttrTarget(start,attr){
  var node=start;
  while(node && node!==document){
   if(node.getAttribute && node.getAttribute(attr)){return node;}
   node=node.parentNode;
  }
  return null;
 }

 function openFullFallbackDetail(id){
  var d=fullDetails[id];
  if(!d){return;}
  var modal=document.getElementById("modal");
  var content=document.getElementById("modalContent");
  if(!modal || !content){return;}

  var routeHtml="";
  for(var i=0;i<d.route.length;i++){
   routeHtml+="<li><b>"+escapeHtmlFull(d.route[i][0])+"</b><span>"+escapeHtmlFull(d.route[i][1])+"</span></li>";
  }

  content.innerHTML=
   "<h2>"+escapeHtmlFull(d.title)+"</h2>"+
   "<p class=\"lead\">"+escapeHtmlFull(d.story)+"</p>"+
   "<div class=\"modal-grid\">"+
    "<div class=\"info\"><small>Длительность</small><b>"+escapeHtmlFull(d.duration)+"</b></div>"+
    "<div class=\"info\"><small>Стоимость</small><b>"+escapeHtmlFull(d.price)+"</b></div>"+
    "<div class=\"info\"><small>Кому подойдёт</small><b>"+escapeHtmlFull(d.forwhom)+"</b></div>"+
    "<div class=\"info\"><small>Формат</small><b>Частная экскурсия</b></div>"+
   "</div>"+
   "<div class=\"detail-section\"><h3>Как проходит маршрут</h3><ul class=\"route-list\">"+routeHtml+"</ul></div>"+
   "<div class=\"detail-section\"><h3>Что входит</h3><p>"+escapeHtmlFull(d.included)+"</p></div>"+
   "<div class=\"detail-section\"><h3>Дополнительные расходы</h3><p>"+escapeHtmlFull(d.extra)+"</p></div>"+
   "<div class=\"detail-section\"><h3>Важно знать</h3><p>"+escapeHtmlFull(d.tips)+"</p></div>"+
   "<div class=\"modal-actions\"><button class=\"btn btn-primary\" type=\"button\" data-full-apply=\""+escapeHtmlFull(id)+"\">Оставить заявку</button><button class=\"btn btn-secondary\" type=\"button\" data-full-close=\"1\">Закрыть</button></div>";

  modal.classList.add("open");
  document.body.style.overflow="hidden";
 }

 document.addEventListener("click",function(event){
  var detailTarget=findAttrTarget(event.target,"data-fallback-detail");
  if(detailTarget){
   event.preventDefault();
   event.stopPropagation();
   if(event.stopImmediatePropagation){event.stopImmediatePropagation();}
   openFullFallbackDetail(detailTarget.getAttribute("data-fallback-detail"));
   return;
  }

  var applyTarget=findAttrTarget(event.target,"data-full-apply");
  if(applyTarget){
   event.preventDefault();
   event.stopPropagation();
   var modal=document.getElementById("modal");
   if(modal){modal.classList.remove("open");}
   document.body.style.overflow="";
   if(typeof window.openApply==="function"){window.openApply(applyTarget.getAttribute("data-full-apply"));}
   return;
  }

  var closeTarget=findAttrTarget(event.target,"data-full-close");
  if(closeTarget){
   event.preventDefault();
   event.stopPropagation();
   if(typeof window.closeModal==="function"){window.closeModal();}
  }
 },true);
})();
</script>
